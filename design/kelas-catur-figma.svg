<svg width="2400" height="1600" viewBox="0 0 2400 1600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Kelas Catur - Figma Ready UI Preview</title>
  <desc>Import file ini ke Figma untuk melihat konsep tampilan website Kelas Catur dengan warna resmi sekolah.</desc>
  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="2400" y2="1600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F5F9FC"/>
      <stop offset="1" stop-color="#DBEAF5"/>
    </linearGradient>
    <linearGradient id="navBg" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#2F6FA3"/>
      <stop offset="1" stop-color="#123A63"/>
    </linearGradient>
    <linearGradient id="heroBg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2F6FA3"/>
      <stop offset="1" stop-color="#123A63"/>
    </linearGradient>
    <linearGradient id="greenAccent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2F9879"/>
      <stop offset="1" stop-color="#236C5B"/>
    </linearGradient>
    <pattern id="schoolPattern" width="56" height="56" patternUnits="userSpaceOnUse">
      <rect width="56" height="56" fill="transparent"/>
      <path d="M0 0H28V28H0V0ZM28 28H56V56H28V28Z" fill="#123A63" opacity="0.04"/>
      <path d="M28 0H56V28H28V0ZM0 28H28V56H0V28Z" fill="#FFFFFF" opacity="0.34"/>
    </pattern>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#17395B" flood-opacity="0.14"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#17395B" flood-opacity="0.10"/>
    </filter>
    <style>
      .font { font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif; }
      .serif { font-family: Georgia, "Times New Roman", serif; }
      .title { font-weight: 700; fill: #172331; }
      .muted { fill: #647386; }
      .navText { fill: rgba(255,255,255,0.76); font-weight: 700; }
      .smallCaps { font-size: 14px; letter-spacing: 2px; font-weight: 700; text-transform: uppercase; }
    </style>
  </defs>

  <rect width="2400" height="1600" fill="url(#pageBg)"/>
  <rect width="2400" height="1600" fill="url(#schoolPattern)"/>

  <g id="Cover / Title">
    <text x="92" y="94" class="font smallCaps" fill="#2F6FA3">Kelas Catur Kecamatan Bungah</text>
    <text x="92" y="142" class="serif title" font-size="42">Figma Ready UI Preview</text>
    <text x="92" y="178" class="font muted" font-size="20">Import SVG ini ke Figma. Semua frame memakai palet biru-putih resmi sekolah.</text>
  </g>

