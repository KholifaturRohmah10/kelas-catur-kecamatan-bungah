  </g>

  <g id="Design Notes" transform="translate(92 1170)">
    <rect width="2258" height="260" rx="30" fill="white" opacity="0.86" filter="url(#softShadow)"/>
    <text x="34" y="56" class="serif title" font-size="30">Catatan Import Figma</text>
    <text x="34" y="100" class="font muted" font-size="18">1. Buka Figma, lalu drag file SVG ini ke canvas atau pilih File - Import.</text>
    <text x="34" y="136" class="font muted" font-size="18">2. Setelah masuk, klik kanan frame lalu pilih Ungroup jika ingin edit detail per elemen.</text>
    <text x="34" y="172" class="font muted" font-size="18">3. Palet resmi: Navy #123A63, Biru #2F6FA3, Hijau #2F9879, Background #EEF5FB, Teks #172331.</text>
    <text x="34" y="208" class="font muted" font-size="18">4. File ini hanya desain visual. Sistem Laravel, route, controller, dan database tidak ikut berubah.</text>
